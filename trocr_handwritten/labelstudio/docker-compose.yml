services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: labelstudio
      POSTGRES_USER: labelstudio
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set in .env}
    volumes:
      - pgdata:/var/lib/postgresql/data
    command: ["postgres", "-c", "shared_buffers=128MB", "-c", "max_connections=50"]

  labelstudio:
    image: heartexlabs/label-studio:latest
    restart: unless-stopped
    depends_on: [db]
    ports:
      - "8080:8080"
    environment:
      DJANGO_DB: default
      POSTGRE_NAME: labelstudio
      POSTGRE_USER: labelstudio
      POSTGRE_PASSWORD: ${POSTGRES_PASSWORD:?set in .env}
      POSTGRE_HOST: db
      POSTGRE_PORT: 5432
      LABEL_STUDIO_HOST: ${LABEL_STUDIO_HOST:-http://localhost:8080}
      LABEL_STUDIO_USERNAME: ${LABEL_STUDIO_USERNAME:?set in .env}
      LABEL_STUDIO_PASSWORD: ${LABEL_STUDIO_PASSWORD:?set in .env}
    volumes:
      - ls-data:/label-studio/data

volumes:
  pgdata:
  ls-data:
